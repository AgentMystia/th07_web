name: verify-and-deploy-pages

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: th07-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: tests/.build/cache
          key: ${{ runner.os }}-node22-testbuild-core-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node22-testbuild-core-${{ hashFiles('package-lock.json') }}-
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test

  replay:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          path: tests/.build/cache
          key: ${{ runner.os }}-node22-testbuild-replay-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-node22-testbuild-replay-${{ hashFiles('package-lock.json') }}-
      - run: npm ci
      - run: npm run replay:verify

  browser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: node scripts/dev-shot.mjs /tmp/th07-ci-boot.png 300
      - run: npm run replay:browser -- tests/replays/th7_udFe25.rpy 1 300 /tmp/th07-ci-replay.png 0
      - run: npm run prepare-pages
      - run: node scripts/browser-boot.mjs dist/pages 300

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [core, replay, browser]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run prepare-pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages
      - id: deployment
        uses: actions/deploy-pages@v4
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
