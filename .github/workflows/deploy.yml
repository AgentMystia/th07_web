# Build-and-deploy for GitHub Pages, from main, via the Pages Actions
# pipeline — no gh-pages branch. The site tree is the runtime surface only
# (scripts/prepare-pages.mjs): entry page, bundle, and the asset subset the
# browser loads; reference/, tests/, scripts/, docs/ never ship.
name: deploy-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run replay:verify
      - run: npm run build
      - run: npm run prepare-pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
